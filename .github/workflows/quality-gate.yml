name: quality-gate

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test-lint-security:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Ruff (lint)
        run: ruff check .

      - name: Bandit (security static analysis)
        run: bandit -q -r . -x tests

      - name: Unit tests with coverage gate
        run: |
          pytest --cov=pdf_image_extractor --cov=extract_images --cov-report=term-missing --cov-fail-under=80

      - name: Mutation testing gate
        if: matrix.python-version == '3.11'
        run: |
          mutmut run --paths-to-mutate pdf_image_extractor/core --runner "python -m pytest tests -q"
          python scripts/check_mutmut_score.py --min-score 70

      - name: Dependency audit
        run: pip-audit -r requirements-ci.txt
